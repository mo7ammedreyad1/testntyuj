name: Ofoq Rust Benchmark Test

on:
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2

      - name: Build Optimized Binary
        run: cargo build --release

      - name: Execute 1-Hour Pool Connection Test
        # نضع حد أقصى للوقت المسموح للأكشن للعمل (مثلا 65 دقيقة لضمان انتهاء الساعة كاملة)
        timeout-minutes: 70 
        run: ./target/release/testntyuj
