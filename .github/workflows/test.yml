name: Check Runner System Specs

on:
  workflow_dispatch: # يتيح لك تشغيل الاختبار يدوياً بزر Run workflow

jobs:
  inspect-system:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Check Operating System (نوع النظام والإصدار)
        run: |
          uname -a
          cat /etc/os-release | grep -E "PRETTY_NAME|VERSION="

      - name: 2. Check CPU Model (اسم وموديل المعالج الفعلي)
        run: |
          lscpu | grep -E "Model name|CPU\(s\):|Thread\(s\) per core|Core\(s\) per socket"

      - name: 3. Check Available RAM (حجم الذاكرة العشوائية المتاحة)
        run: free -h
